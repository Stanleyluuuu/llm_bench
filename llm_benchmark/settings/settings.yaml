            - linxpa-rk9pekafka02.garmin.com:9092
            - linxpa-rk9pekafka03.garmin.com:9092
            - linxpa-rk9pekafka04.garmin.com:9092
            - linxpa-rk9pekafka05.garmin.com:9092
            - linxpa-rk9pekafka06.garmin.com:9092
          user: pids
          topic: dslog-avro
        schema_registry:
          url: https://linxpa-pehaproxy00.garmin.com:8085
        level: info

