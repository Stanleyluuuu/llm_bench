<!-- @dsCard group="Components" viewport="700x560" name="Core Components" subtitle="Button · Badge · Progress · MetricCard · ModelChip" -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <style>
    body { margin: 0; padding: 16px; background: hsl(var(--background)); }
    .section { margin-bottom: 18px; }
    .section-label { font-size: 10px; font-family: var(--font-mono); color: hsl(var(--muted-foreground)); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .divider { height: 1px; background: hsl(var(--border)); margin: 4px 0 16px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Button, Badge, Progress, MetricCard, ModelChip } = window.GarminLLMBenchmark_d1bc28 || {};

    function Card() {
      const [toggled, setToggled] = React.useState([true, false, true, false]);
      const toggle = i => setToggled(p => p.map((v, j) => j === i ? !v : v));

      return (
        <div>
          {/* Buttons */}
          <div className="section">
            <div className="section-label">Button — variants</div>
            <div className="row">
              <Button variant="primary">開始評估</Button>
              <Button variant="secondary">重新載入</Button>
              <Button variant="outline">歷史趨勢</Button>
              <Button variant="ghost">取消</Button>
              <Button variant="destructive" size="sm">刪除</Button>
            </div>
          </div>
          <div className="section">
            <div className="section-label">Button — sizes &amp; states</div>
            <div className="row">
              <Button size="sm">Small</Button>
              <Button size="md">Medium</Button>
              <Button size="lg">Large</Button>
              <Button disabled>Disabled</Button>
              <Button loading>評估中…</Button>
            </div>
          </div>
          <div className="divider" />

          {/* Badges */}
          <div className="section">
            <div className="section-label">Badge — status &amp; source</div>
            <div className="row">
              <Badge variant="success" dot>Pass</Badge>
              <Badge variant="error" dot>Fail</Badge>
              <Badge variant="warning">Parse Error</Badge>
              <Badge variant="pending" dot>Running</Badge>
              <Badge variant="builtin" dot>Builtin</Badge>
              <Badge variant="custom" dot>Custom</Badge>
            </div>
          </div>
          <div className="section">
            <div className="section-label">Badge — score bands &amp; capabilities</div>
            <div className="row">
              <Badge variant="score-high">92.4%</Badge>
              <Badge variant="score-mid">61.2%</Badge>
              <Badge variant="score-low">23.7%</Badge>
              <Badge variant="grounding" pill={false}>Grounding</Badge>
              <Badge variant="ocr" pill={false}>OCR</Badge>
              <Badge variant="detection" pill={false}>Detection</Badge>
              <Badge variant="vlm" pill={false}>VLM</Badge>
            </div>
          </div>
          <div className="divider" />

          {/* Progress */}
          <div className="section">
            <div className="section-label">Progress — variants</div>
            <div style={{display:'flex',flexDirection:'column',gap:8,maxWidth:400}}>
              {[['default',78],['success',92],['warning',55],['destructive',23],['score-high',88],['score-mid',62],['score-low',19]].map(([v,val]) => (
                <div key={v} style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:10,fontFamily:'var(--font-mono)',color:'hsl(var(--muted-foreground))',width:90}}>{v}</span>
                  <div style={{flex:1}}><Progress value={val} variant={v} /></div>
                  <span style={{fontSize:10,fontFamily:'var(--font-mono)',color:'hsl(var(--foreground))',width:30}}>{val}%</span>
                </div>
              ))}
            </div>
          </div>
          <div className="divider" />

          {/* MetricCard */}
          <div className="section">
            <div className="section-label">MetricCard — states</div>
            <div className="row" style={{alignItems:'stretch'}}>
              <div style={{flex:1,minWidth:140}}><MetricCard label="準確率" value="92.4" unit="%" /></div>
              <div style={{flex:1,minWidth:140}}><MetricCard label="Avg Score" value="4.2" unit="/ 5" status="active" /></div>
              <div style={{flex:1,minWidth:140}}><MetricCard label="Response" value="8.4" unit="s" status="warning" /></div>
              <div style={{flex:1,minWidth:140}}><MetricCard label="Loading" loading /></div>
              <div style={{flex:1,minWidth:140}}><MetricCard label="RAGAS" value={null} /></div>
            </div>
          </div>
          <div className="divider" />

          {/* ModelChip */}
          <div className="section">
            <div className="section-label">ModelChip — enabled / disabled / custom</div>
            <div className="row" style={{flexWrap:'wrap'}}>
              <ModelChip label="LLM Large" name="qwen3-72b" kind="builtin" enabled={toggled[0]} modelType="LLM" onToggle={() => toggle(0)} />
              <ModelChip label="LLM Small" name="qwen3-14b" kind="builtin" enabled={toggled[1]} modelType="LLM" onToggle={() => toggle(1)} />
              <ModelChip label="VLM Large" name="qwen-vl" kind="builtin" enabled={toggled[2]} modelType="VLM" onToggle={() => toggle(2)} />
              <ModelChip label="Qwen3-27B" name="Qwen3-27B" kind="custom" enabled={toggled[3]} accentColor="#8b5cf6" modelType="LLM" onToggle={() => toggle(3)} />
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Card />);
  </script>
</body>
</html>
