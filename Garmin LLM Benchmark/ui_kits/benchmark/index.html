<!-- @dsCard group="LLM Benchmark" viewport="1280x800" name="Dashboard v2" subtitle="LLM judge + VLM match/OCR/locate · regression analysis · per-case detail · history trends" -->
<!-- @startingPoint section="LLM Benchmark" subtitle="Full LLM/VLM benchmark dashboard: regression analysis, judge reasoning, bbox grounding, history trends" viewport="1280x800" -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI 模型評測平台</title>
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="data.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{margin:0;font-family:var(--font-sans);background:hsl(var(--background));color:hsl(var(--foreground))}
    @keyframes sp-rotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    @keyframes sp-breathe{0%,100%{opacity:1}50%{opacity:.65}}
    .spinner{position:relative;border-radius:50%;width:64px;height:64px;animation:sp-rotate 1.2s linear infinite,sp-breathe 2s ease-in-out infinite;background-image:linear-gradient(hsl(var(--spinner-from)),hsl(var(--spinner-to)),hsl(var(--spinner-edge)))}
    .spinner::after{content:"";position:absolute;top:8px;left:8px;right:8px;bottom:8px;background:hsl(var(--card));border:4px solid hsl(var(--card));border-radius:50%}
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="parts.jsx"></script>
<script type="text/babel" src="history.jsx"></script>

<script type="text/babel">
const { ModelChip } = window.GarminLLMBenchmark_d1bc28 || {};
const { INIT_MODELS, LLM_PROJECTS, VLM_PROJECTS, RESULTS, CASES_BY_PROJECT, STAGES, S, sc, sb, isRegr } = window.BM;
const { card, mono, muted, lbl } = S;
const { CaseInspector, ModelCol, ProjRow, HistoryPanel } = window;

const ALL_PROJECTS = [...LLM_PROJECTS, ...VLM_PROJECTS];
const PROJ_META = Object.fromEntries(ALL_PROJECTS.map(p=>[p.name,p]));

/* ── RESULT CARD ─────────────────────────────────────────── */
function ResultCard({projectName, label, enabledModels, baselineId}) {
  const [open, setOpen]           = React.useState(false);
  const [showCases, setShowCases] = React.useState(false);
  const meta    = PROJ_META[projectName] || {};
  const metric  = meta.vlmType || 'llm';
  const data    = RESULTS[projectName]||{};
  const entries = enabledModels.filter(m=>data[m.id]);
  const champion= entries.reduce((b,m)=>((data[m.id]?.score||0)>(data[b?.id]?.score||0)?m:b), null);
  const hasCases= !!CASES_BY_PROJECT[projectName];
  const baseInEntries = entries.some(m=>m.id===baselineId) ? baselineId : entries[0]?.id;
  const candId  = entries.find(m=>m.id!==baseInEntries)?.id;
  const regCount= hasCases ? CASES_BY_PROJECT[projectName].filter(c=>isRegr(c,baseInEntries,candId)).length : 0;

  return (
    <div style={{...card,overflow:'hidden',marginBottom:14}}>
      <div onClick={()=>setOpen(v=>!v)} style={{padding:'13px 20px',borderBottom:open?'1px solid hsl(var(--border))':'none',display:'flex',alignItems:'center',gap:12,cursor:'pointer',background:open?'hsl(var(--accent)/.3)':'transparent',transition:'background .15s'}}>
        <div style={{padding:6,borderRadius:'var(--radius-md)',background:'hsl(var(--success)/.1)',color:'hsl(var(--success))'}}>
          <svg width={15} height={15} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <span style={{fontWeight:600,flex:1}}>{label}</span>
        {meta.cap && <span style={{...mono,fontSize:10,...muted}}>{meta.cap}</span>}
        {regCount>0 && <span style={{...mono,fontSize:10,padding:'2px 9px',borderRadius:'var(--radius-full)',background:'hsl(var(--destructive)/.1)',color:'hsl(0 72% 38%)',border:'1px solid hsl(var(--destructive)/.3)',fontWeight:700}}>⚠ {regCount} 退步</span>}
        <svg width={14} height={14} viewBox="0 0 24 24" fill="none" stroke="hsl(var(--muted-foreground))" strokeWidth={2} style={{transform:open?'rotate(180deg)':'none',transition:'transform .2s'}}><polyline points="6 9 12 15 18 9"/></svg>
      </div>

      {open && (
        <>
          <div style={{padding:'16px 20px',borderBottom:showCases&&hasCases?'1px solid hsl(var(--border))':'none'}}>
            <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
              {entries.map(m=>(
                <ModelCol key={m.id} label={m.label} data={data[m.id]} modelId={m.id} metricType={metric}
                  champion={m.id===champion?.id&&entries.length>1} isBaseline={m.id===baseInEntries}/>
              ))}
              {entries.length===0&&<span style={lbl}>此任務無對應啟用模型（請在上方啟用對應的 {meta.type} 模型）</span>}
            </div>
            {hasCases && entries.length>0 && (
              <button onClick={e=>{e.stopPropagation();setShowCases(v=>!v);}} style={{...mono,fontSize:11,marginTop:12,padding:'5px 14px',border:'1px solid hsl(var(--border))',borderRadius:'var(--radius-md)',background:'hsl(var(--secondary))',color:'hsl(var(--foreground))',cursor:'pointer',display:'inline-flex',alignItems:'center',gap:5}}>
                <svg width={11} height={11} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2}><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                {showCases?'收起案例詳情':'展開逐題分析 & 退步篩選'}
              </button>
            )}
          </div>
          {showCases && hasCases && entries.length>0 && (
            <CaseInspector cases={CASES_BY_PROJECT[projectName]} enabledModels={entries} baseId={baseInEntries}/>
          )}
        </>
      )}
    </div>
  );
}

/* ── APP ─────────────────────────────────────────────────── */
function App() {
  const [dark, setDark]   = React.useState(false);
  const [models, setModels] = React.useState(INIT_MODELS);
  const [sel, setSel]     = React.useState(new Set(['general_qa','code_review','translation']));
  const [tab, setTab]     = React.useState('LLM');
  const [phase, setPhase] = React.useState('idle');
  const [prog, setProg]   = React.useState(0);
  const [stgIdx, setStgIdx] = React.useState(0);
  const [hist, setHist]   = React.useState(false);
  const [baseLLM, setBaseLLM] = React.useState('llm_small');
  const [baseVLM, setBaseVLM] = React.useState('vlm_small');
  const [showAdd, setShowAdd] = React.useState(false);
  const [form, setForm] = React.useState({name:'',url:'',type:'LLM',resize:false,w:'',h:''});
  /* conn: {state:'idle'|'testing'|'ok'|'fail', msg} — reset whenever the URL changes */
  const [conn, setConn] = React.useState({state:'idle',msg:''});
  const setF = patch => setForm(f=>{ if('url' in patch) setConn({state:'idle',msg:''}); return {...f,...patch}; });

  /* Validate a model endpoint. Returns {ok, msg}. In this prototype the network
     probe is simulated; a real deployment would issue a /v1/models HEAD/GET. */
  function probeUrl(raw){
    return new Promise(resolve=>{
      const url=(raw||'').trim();
      if(!url) return resolve({ok:false,msg:'請先填入連線 URL'});
      const cand = /^https?:\/\//.test(url)?url:('http://'+url);
      let valid=true; try{ new URL(cand); }catch(e){ valid=false; }
      if(!valid||!/^https?:\/\/[^\s]+\.[^\s]|^https?:\/\/[\d.]+(?::\d+)?/.test(cand))
        return resolve({ok:false,msg:'URL 格式無效，請確認主機與連接埠'});
      // simulated latency + reachability (host ending in .invalid / unreachable demo host fails)
      setTimeout(()=>{
        const unreachable = /\.invalid\b|:0\b|localhost:1\b/.test(cand);
        resolve(unreachable
          ? {ok:false,msg:'無法連線：端點未回應（逾時）'}
          : {ok:true,msg:'連線成功 · 端點回應正常'});
      }, 800);
    });
  }
  async function testConn(){
    setConn({state:'testing',msg:'測試連線中…'});
    const r = await probeUrl(form.url);
    setConn({state:r.ok?'ok':'fail',msg:r.msg});
    return r.ok;
  }
  async function addModel(){
    if(addInvalid) return;
    // always re-verify on save — only persist a reachable endpoint
    const ok = conn.state==='ok' ? true : await testConn();
    if(!ok) return;
    const t=form.type, url=form.url.trim(), name=form.name.trim();
    const useResize = t==='VLM'&&form.resize&&form.w&&form.h;
    const href = /^https?:\/\//.test(url)?url:('http://'+url);
    const det=[{label:'端點',value:url,href},{label:'類型',value:t},{label:'狀態',value:'已驗證連線'},{label:'供應',value:'使用者新增'}];
    if(useResize) det.push({label:'Resize',value:`${form.w}×${form.h}`});
    setModels(ms=>[...ms,{id:'custom_'+Date.now(),label:name,name:url,kind:'custom',type:t,enabled:true,color:'#14b8a6',details:det,resize:useResize?{w:+form.w,h:+form.h}:null}]);
    setShowAdd(false);
  }
  const addInvalid = !form.name.trim()||!form.url.trim()||(form.type==='VLM'&&form.resize&&(!form.w||!form.h));

  React.useEffect(()=>{ document.documentElement.className=dark?'dark':''; },[dark]);

  const toggleM = id => setModels(ms=>ms.map(m=>m.id===id?{...m,enabled:!m.enabled}:m));
  const toggleP = n  => setSel(p=>{const n2=new Set(p);n2.has(n)?n2.delete(n):n2.add(n);return n2;});

  function evaluate() {
    setPhase('loading');setProg(0);setStgIdx(0);
    let i=0;const iv=setInterval(()=>{i++;setProg(i*20);setStgIdx(i);if(i>=5){clearInterval(iv);setTimeout(()=>setPhase('results'),400);}},480);
  }

  const enabled  = models.filter(m=>m.enabled);
  const llmEnabled = enabled.filter(m=>m.type==='LLM');
  const vlmEnabled = enabled.filter(m=>m.type==='VLM');

  /* keep baselines valid */
  React.useEffect(()=>{ if(llmEnabled.length && !llmEnabled.some(m=>m.id===baseLLM)) setBaseLLM(llmEnabled[0].id); },[enabled]);
  React.useEffect(()=>{ if(vlmEnabled.length && !vlmEnabled.some(m=>m.id===baseVLM)) setBaseVLM(vlmEnabled[0].id); },[enabled]);

  const llmMs    = models.filter(m=>m.type==='LLM');
  const vlmMs    = models.filter(m=>m.type==='VLM');
  const selProjs = ALL_PROJECTS.filter(p=>sel.has(p.name));
  const totalEst = selProjs.reduce((s,p)=>s+p.est,0)*Math.max(enabled.length,1);
  const tabProjs = tab==='LLM'?LLM_PROJECTS:VLM_PROJECTS;
  const baselineFor = p => p.type==='VLM'?baseVLM:baseLLM;
  const llmSel = selProjs.filter(p=>p.type==='LLM').length;
  const vlmSel = selProjs.length - llmSel;
  /* gate: an LLM model cannot run a VLM task (VLM models can run both) */
  const modalityConflict = vlmSel>0 && llmEnabled.length>0;
  const conflictLLM = llmEnabled.map(m=>m.label).join('、');
  const conflictVLM = selProjs.filter(p=>p.type==='VLM').map(p=>p.label).join('、');
  const totalReg = selProjs.reduce((sum,p)=>{
    const d=RESULTS[p.name]||{}; return sum + enabled.reduce((s,m)=>s+(d[m.id]?.regressions||0),0);
  },0);

  const inp = {width:'100%',...mono,fontSize:'var(--text-sm)',padding:'8px 10px',border:'1px solid hsl(var(--border))',borderRadius:'var(--radius-sm)',background:'hsl(var(--secondary))',color:'hsl(var(--foreground))',outline:'none'};
  const baseSelect = (value,onChange,opts,tag) => (
    <label style={{display:'flex',alignItems:'center',gap:5,...lbl}}>
      <span style={{padding:'1px 5px',borderRadius:3,background:'hsl(var(--secondary))',border:'1px solid hsl(var(--border))'}}>{tag}</span>
      <select value={value} onChange={e=>onChange(e.target.value)} style={{...mono,fontSize:11,padding:'3px 8px',border:'1px solid hsl(var(--border))',borderRadius:'var(--radius-sm)',background:'hsl(var(--secondary))',color:'hsl(var(--foreground))'}}>
        {opts.map(m=><option key={m.id} value={m.id}>{m.label}</option>)}
      </select>
    </label>
  );

  return (
    <div style={{minHeight:'100vh',background:'hsl(var(--background))'}}>
      <div style={{maxWidth:1100,margin:'0 auto',padding:'24px 24px 130px'}}>

        {/* Header */}
        <div style={{...card,padding:'14px 22px',display:'flex',alignItems:'center',gap:14,marginBottom:16,flexWrap:'wrap'}}>
          <span style={{fontSize:20}}>⚡</span>
          <div style={{flex:1,minWidth:180}}>
            <h1 style={{margin:0,fontSize:'var(--text-xl)',fontWeight:700}}>AI 模型評測平台</h1>
            <p style={{margin:'1px 0 0',fontSize:'var(--text-xs)',...muted}}>選擇模型與測試專案，一鍵比較 LLM / VLM 效能</p>
          </div>
          {/* Baseline (regression reference) — separate for LLM and VLM */}
          <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
            <span style={{...lbl}}>比較基準模型</span>
            {llmEnabled.length>=2 && baseSelect(baseLLM,setBaseLLM,llmEnabled,'LLM')}
            {vlmEnabled.length>=2 && baseSelect(baseVLM,setBaseVLM,vlmEnabled,'VLM')}
            {(llmEnabled.length<2 && vlmEnabled.length<2) && <span style={{...lbl,opacity:.7}}>（同類型需 ≥2 個模型）</span>}
          </div>
          <button onClick={()=>setDark(d=>!d)} style={{...mono,fontSize:11,padding:'5px 12px',border:'1px solid hsl(var(--border))',borderRadius:'var(--radius-md)',background:'hsl(var(--secondary))',color:'hsl(var(--foreground))',cursor:'pointer'}}>
            {dark?'☀ Light':'☾ Dark'}
          </button>
          <button onClick={()=>{setForm({name:'',url:'',type:'LLM',resize:false,w:'',h:''});setConn({state:'idle',msg:''});setShowAdd(true);}} style={{...mono,fontSize:11,padding:'5px 13px',border:'1px solid hsl(var(--primary))',borderRadius:'var(--radius-md)',background:'hsl(var(--primary))',color:'hsl(var(--primary-foreground))',cursor:'pointer',display:'inline-flex',alignItems:'center',gap:5,fontWeight:600}}>
            <span style={{fontSize:14,lineHeight:1}}>+</span> 新增模型
          </button>
        </div>

        {/* Models Card */}
        <div style={{...card,marginBottom:16,overflow:'hidden'}}>
          <div style={{padding:'12px 20px',borderBottom:'1px solid hsl(var(--border))',display:'flex',alignItems:'center',gap:10}}>
            <h2 style={{margin:0,fontSize:'var(--text-base)',fontWeight:600}}>Benchmark 模型</h2>
            <span style={{...lbl,marginLeft:'auto'}}>點模型右側可展開端點 / 連結等細節</span>
          </div>
          <div style={{padding:'14px 20px',display:'flex',flexDirection:'column',gap:14}}>
            {[{label:'LLM',ms:llmMs},{label:'VLM',ms:vlmMs}].map(g=>(
              <div key={g.label}>
                <span style={{...lbl,display:'inline-block',padding:'2px 8px',border:'1px solid hsl(var(--border))',borderRadius:'var(--radius-sm)',marginBottom:8}}>{g.label}</span>
                <div style={{display:'flex',flexWrap:'wrap',gap:8,alignItems:'flex-start'}}>
                  {ModelChip
                    ? g.ms.map(m=><ModelChip key={m.id} label={m.label} name={m.name} kind={m.kind} enabled={m.enabled} modelType={m.type} accentColor={m.color} details={m.details} onToggle={()=>toggleM(m.id)}/>)
                    : g.ms.map(m=>(<div key={m.id} onClick={()=>toggleM(m.id)} style={{border:`2px solid ${m.enabled?'hsl(var(--primary))':'hsl(var(--border))'}`,borderRadius:12,height:64,minWidth:150,display:'flex',alignItems:'center',padding:'0 14px',cursor:'pointer',background:m.enabled?'hsl(var(--primary)/.06)':'hsl(var(--card))'}}><span style={{fontSize:'var(--text-sm)',fontWeight:600}}>{m.label}</span></div>))
                  }
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Projects Card */}
        <div style={{...card,marginBottom:16,overflow:'hidden'}}>
          <div style={{padding:'12px 20px',borderBottom:'1px solid hsl(var(--border))',display:'flex',alignItems:'center',gap:10}}>
            <h2 style={{margin:0,fontSize:'var(--text-base)',fontWeight:600}}>測試專案</h2>
            <div style={{display:'inline-flex',border:'1px solid hsl(var(--border))',borderRadius:'var(--radius-lg)',overflow:'hidden',background:'hsl(var(--secondary))'}}>
              {['LLM','VLM'].map(t=>{
                const cnt=(t==='LLM'?LLM_PROJECTS:VLM_PROJECTS).filter(p=>sel.has(p.name)).length;
                return (
                  <button key={t} onClick={()=>setTab(t)} style={{padding:'3px 12px',fontSize:'var(--text-xs)',...mono,border:'none',cursor:'pointer',display:'inline-flex',alignItems:'center',gap:5,background:tab===t?'hsl(var(--primary))':'transparent',color:tab===t?'hsl(var(--primary-foreground))':'hsl(var(--muted-foreground))',fontWeight:tab===t?600:400,transition:'all .12s'}}>
                    {t}
                    {cnt>0 && <span style={{fontSize:9,minWidth:15,height:15,padding:'0 4px',borderRadius:'var(--radius-full)',display:'inline-flex',alignItems:'center',justifyContent:'center',fontWeight:700,background:tab===t?'hsl(var(--primary-foreground))':'hsl(var(--primary))',color:tab===t?'hsl(var(--primary))':'hsl(var(--primary-foreground))'}}>{cnt}</span>}
                  </button>
                );
              })}
            </div>
            <span style={{...lbl,marginLeft:'auto'}}>已選 {sel.size} 個任務</span>
          </div>
          <div style={{padding:'10px 20px'}}>
            {tabProjs.map(p=><ProjRow key={p.name} p={p} sel={sel.has(p.name)} onToggle={()=>toggleP(p.name)}/>)}
          </div>
          {selProjs.length>0 && (
            <div style={{padding:'2px 20px 14px',borderTop:'1px solid hsl(var(--border))'}}>
              <div style={{...lbl,margin:'10px 0 7px'}}>已選任務 · LLM {llmSel} · VLM {vlmSel}（橫跨兩類；點 × 即可取消，不必切換分頁）</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                {selProjs.map(p=>{
                  const bad = p.type==='VLM' && modalityConflict;
                  return (
                    <span key={p.name} style={{display:'inline-flex',alignItems:'center',gap:6,padding:'3px 4px 3px 8px',borderRadius:'var(--radius-full)',...mono,fontSize:11,border:`1px solid ${bad?'hsl(var(--destructive)/.5)':'hsl(var(--border))'}`,background:bad?'hsl(var(--destructive)/.07)':'hsl(var(--secondary))'}}>
                      <span style={{fontSize:8,padding:'1px 5px',borderRadius:'var(--radius-sm)',fontWeight:700,background:p.type==='VLM'?'hsl(265 60% 55%/.15)':'hsl(216 41% 43%/.12)',color:p.type==='VLM'?'hsl(265 55% 45%)':'hsl(var(--primary))'}}>{p.type}</span>
                      <span style={{color:bad?'hsl(0 72% 38%)':'hsl(var(--foreground))'}}>{p.label}</span>
                      <button onClick={()=>toggleP(p.name)} title="取消勾選" style={{border:'none',background:'transparent',cursor:'pointer',color:'hsl(var(--muted-foreground))',fontSize:14,lineHeight:1,padding:'0 3px',borderRadius:'var(--radius-full)'}}>×</button>
                    </span>
                  );
                })}
              </div>
            </div>
          )}
        </div>

        {/* Modality conflict gate */}
        {modalityConflict && (
          <div style={{...card,marginBottom:16,padding:'12px 16px',borderLeft:'3px solid hsl(var(--destructive))',background:'hsl(var(--destructive)/.05)',display:'flex',gap:10,alignItems:'flex-start'}}>
            <span style={{fontSize:15,color:'hsl(0 72% 38%)',lineHeight:1.4}}>⚠</span>
            <div>
              <p style={{margin:'0 0 3px',fontWeight:700,fontSize:'var(--text-sm)',color:'hsl(0 72% 38%)'}}>模型與任務不相容，無法評估</p>
              <p style={{margin:0,fontSize:'var(--text-xs)',lineHeight:1.7,...muted}}>
                LLM 模型（<b style={{color:'hsl(var(--foreground))'}}>{conflictLLM}</b>）無法執行 VLM 任務（<b style={{color:'hsl(var(--foreground))'}}>{conflictVLM}</b>）。VLM 模型可同時跑 LLM 與 VLM 任務，但 LLM 模型只能跑純文字任務。<b style={{color:'hsl(var(--foreground))'}}>請停用上方的 LLM 模型，或取消這些 VLM 任務後再評估。</b>
              </p>
            </div>
          </div>
        )}

        {/* Results */}
        {phase==='results' && (
          <div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,flexWrap:'wrap'}}>
              <h2 style={{margin:0,fontSize:'var(--text-base)',fontWeight:600}}>評測結果</h2>
              <span style={lbl}>{selProjs.length} 個任務 · {enabled.length} 個模型</span>
              {totalReg>0 && <span style={{...mono,fontSize:10,padding:'2px 9px',borderRadius:'var(--radius-full)',background:'hsl(var(--destructive)/.1)',color:'hsl(0 72% 38%)',border:'1px solid hsl(var(--destructive)/.35)',fontWeight:700,marginLeft:4}}>⚠ 共發現 {totalReg} 起退步</span>}
            </div>
            <div style={{...card,padding:'11px 15px',marginBottom:14,display:'flex',gap:9,alignItems:'flex-start',borderLeft:'3px solid hsl(var(--destructive))'}}>
              <span style={{fontSize:13,color:'hsl(0 72% 38%)',flexShrink:0,lineHeight:1.5}}>ⓘ</span>
              <p style={{margin:0,fontSize:'var(--text-xs)',lineHeight:1.75,...muted}}>
                <b style={{color:'hsl(0 72% 38%)'}}>退步（Regression）</b> 指以「比較基準模型」為準，<b style={{color:'hsl(var(--foreground))'}}>基準模型答對、但所比較的新模型卻答錯</b>的題目。此詞借自軟體的「回歸測試」——新版本破壞了原本正常的功能。它代表新模型整體分數雖可能提升，卻在原本能答對的案例上倒退，是上線前最需重點檢查的風險。比較基準可在右上角分別為 LLM 與 VLM 設定。
              </p>
            </div>
            {selProjs.map(p=>(
              <ResultCard key={p.name} projectName={p.name} label={p.label} enabledModels={enabled} baselineId={baselineFor(p)}/>
            ))}
          </div>
        )}
        {phase==='idle' && (
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'56px 0',gap:10,...muted}}>
            <svg width={44} height={44} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.5} style={{opacity:.2}}><rect x={2} y={3} width={20} height={14} rx={2}/><path d="M8 21h8M12 17v4"/><path d="M7 8h10M7 12h6"/></svg>
            <p style={{margin:0,fontSize:'var(--text-sm)',fontWeight:500}}>尚無評測結果</p>
            <p style={{margin:0,fontSize:'var(--text-xs)'}}>選擇模型與測試項目以開始評估</p>
          </div>
        )}

        {hist && <HistoryPanel/>}
      </div>

      {/* Add-model modal */}
      {showAdd && (
        <div onClick={()=>setShowAdd(false)} style={{position:'fixed',inset:0,background:'hsl(var(--foreground)/.5)',backdropFilter:'blur(4px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:60,padding:20}}>
          <div onClick={e=>e.stopPropagation()} style={{...card,width:400,maxWidth:'100%',padding:0,boxShadow:'var(--shadow-xl)',overflow:'hidden'}}>
            <div style={{padding:'14px 18px',borderBottom:'1px solid hsl(var(--border))',display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:16}}>🔌</span>
              <h3 style={{margin:0,fontSize:'var(--text-base)',fontWeight:700,flex:1}}>新增模型連線</h3>
              <button onClick={()=>setShowAdd(false)} style={{border:'none',background:'transparent',cursor:'pointer',color:'hsl(var(--muted-foreground))',fontSize:20,lineHeight:1,padding:0}}>×</button>
            </div>
            <div style={{padding:'16px 18px',display:'flex',flexDirection:'column',gap:14}}>
              <div>
                <label style={{...lbl,display:'block',marginBottom:5}}>模型名稱</label>
                <input value={form.name} onChange={e=>setF({name:e.target.value})} placeholder="例：Qwen2.5-VL-32B" style={inp}/>
              </div>
              <div>
                <label style={{...lbl,display:'block',marginBottom:5}}>連線 URL</label>
                <div style={{display:'flex',gap:8}}>
                  <input value={form.url} onChange={e=>setF({url:e.target.value})} placeholder="例：10.0.4.30:8000/v1" style={{...inp,flex:1}}/>
                  <button onClick={testConn} disabled={!form.url.trim()||conn.state==='testing'} style={{...mono,fontSize:'var(--text-xs)',fontWeight:600,padding:'0 14px',whiteSpace:'nowrap',border:`1px solid ${conn.state==='ok'?'hsl(var(--success))':'hsl(var(--primary))'}`,borderRadius:'var(--radius-sm)',background:conn.state==='ok'?'hsl(var(--success)/.1)':'transparent',color:conn.state==='ok'?'hsl(160 70% 28%)':'hsl(var(--primary))',cursor:(!form.url.trim()||conn.state==='testing')?'not-allowed':'pointer',opacity:(!form.url.trim())?0.4:1,display:'inline-flex',alignItems:'center',gap:5}}>
                    {conn.state==='testing'
                      ? <><span style={{width:11,height:11,border:'2px solid currentColor',borderTopColor:'transparent',borderRadius:'50%',display:'inline-block',animation:'sp-rotate .7s linear infinite'}}/>測試中</>
                      : conn.state==='ok' ? <>✓ 已驗證</> : '測試連線'}
                  </button>
                </div>
                {conn.state!=='idle' && conn.state!=='testing' && (
                  <div className="animate-fade-in" style={{display:'flex',alignItems:'center',gap:6,marginTop:7,padding:'5px 9px',borderRadius:'var(--radius-sm)',fontSize:'var(--text-xs)',...mono,background:conn.state==='ok'?'hsl(var(--success)/.08)':'hsl(var(--destructive)/.08)',color:conn.state==='ok'?'hsl(160 70% 28%)':'hsl(0 72% 38%)',border:`1px solid ${conn.state==='ok'?'hsl(var(--success)/.3)':'hsl(var(--destructive)/.3)'}`}}>
                    <span>{conn.state==='ok'?'●':'⚠'}</span>{conn.msg}
                  </div>
                )}
                {conn.state==='idle' && <p style={{margin:'6px 0 0',...lbl,fontSize:10,lineHeight:1.5}}>儲存前會自動驗證端點是否可達，僅可儲存連線成功的模型。</p>}
              </div>
              <div>
                <label style={{...lbl,display:'block',marginBottom:5}}>類型</label>
                <div style={{display:'inline-flex',border:'1px solid hsl(var(--border))',borderRadius:'var(--radius-md)',overflow:'hidden',background:'hsl(var(--secondary))'}}>
                  {['LLM','VLM'].map(t=>(
                    <button key={t} onClick={()=>setF({type:t})} style={{...mono,fontSize:'var(--text-xs)',padding:'5px 18px',border:'none',cursor:'pointer',background:form.type===t?'hsl(var(--primary))':'transparent',color:form.type===t?'hsl(var(--primary-foreground))':'hsl(var(--muted-foreground))',fontWeight:form.type===t?600:400,transition:'all .12s'}}>{t}</button>
                  ))}
                </div>
              </div>
              {form.type==='VLM' && (
                <div style={{padding:'11px 13px',borderRadius:'var(--radius-md)',border:`1px solid ${form.resize?'hsl(var(--primary)/.4)':'hsl(var(--border))'}`,background:form.resize?'hsl(var(--primary)/.05)':'hsl(var(--secondary))',transition:'all .15s'}}>
                  <label onClick={()=>setF({resize:!form.resize})} style={{display:'flex',alignItems:'center',gap:9,cursor:'pointer'}}>
                    <span style={{width:18,height:18,borderRadius:4,border:`2px solid ${form.resize?'hsl(var(--primary))':'hsl(var(--muted-foreground))'}`,background:form.resize?'hsl(var(--primary))':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .14s'}}>
                      {form.resize&&<svg width={11} height={11} viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="hsl(var(--primary-foreground))" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                    </span>
                    <span style={{fontSize:'var(--text-sm)',fontWeight:500}}>啟用影像 Resize</span>
                    <span style={{...lbl,fontSize:10,marginLeft:'auto'}}>Grounding 前處理</span>
                  </label>
                  {form.resize && (
                    <div className="animate-fade-in" style={{marginTop:11}}>
                      <p style={{margin:'0 0 8px',fontSize:'var(--text-xs)',...muted,lineHeight:1.6}}>定位（grounding）任務會將影像縮放至此尺寸再送入模型，各模型需求可能不同。</p>
                      <div style={{display:'flex',gap:10}}>
                        <div style={{flex:1}}>
                          <label style={{...lbl,display:'block',marginBottom:4}}>Width (px)</label>
                          <input type="number" min="1" value={form.w} onChange={e=>setF({w:e.target.value})} placeholder="640" style={inp}/>
                        </div>
                        <div style={{flex:1}}>
                          <label style={{...lbl,display:'block',marginBottom:4}}>Height (px)</label>
                          <input type="number" min="1" value={form.h} onChange={e=>setF({h:e.target.value})} placeholder="640" style={inp}/>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
            <div style={{padding:'12px 18px',borderTop:'1px solid hsl(var(--border))',display:'flex',justifyContent:'flex-end',gap:8}}>
              <button onClick={()=>setShowAdd(false)} style={{...mono,fontSize:'var(--text-xs)',padding:'7px 16px',border:'1px solid hsl(var(--border))',borderRadius:'var(--radius-md)',background:'transparent',color:'hsl(var(--foreground))',cursor:'pointer'}}>取消</button>
              <button onClick={addModel} disabled={addInvalid||conn.state==='testing'} style={{...mono,fontSize:'var(--text-xs)',fontWeight:600,padding:'7px 18px',border:'none',borderRadius:'var(--radius-md)',background:'hsl(var(--primary))',color:'hsl(var(--primary-foreground))',cursor:(addInvalid||conn.state==='testing')?'not-allowed':'pointer',opacity:(addInvalid||conn.state==='testing')?0.4:1}}>{conn.state==='ok'?'新增模型':'驗證並新增'}</button>
            </div>
          </div>
        </div>
      )}

      {/* Loading */}
      {phase==='loading' && (
        <div style={{position:'fixed',inset:0,background:'hsl(var(--foreground)/.5)',backdropFilter:'blur(4px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:50}}>
          <div style={{...card,padding:36,display:'flex',flexDirection:'column',alignItems:'center',gap:16,minWidth:260,boxShadow:'var(--shadow-xl)'}}>
            <div className="spinner"/>
            <div style={{textAlign:'center'}}>
              <p style={{margin:'0 0 3px',fontWeight:600}}>評估進行中</p>
              <p style={{...mono,fontSize:'var(--text-xs)',...muted,margin:0}}>{STAGES[stgIdx]||''}</p>
            </div>
            <div style={{width:'100%',height:6,borderRadius:'var(--radius-full)',background:'hsl(var(--secondary))',overflow:'hidden'}}>
              <div style={{width:`${prog}%`,height:'100%',background:'hsl(var(--primary))',borderRadius:'var(--radius-full)',transition:'width .4s var(--ease-spring)'}}/>
            </div>
            <span style={{...mono,fontSize:'var(--text-xs)',...muted}}>{prog}%</span>
          </div>
        </div>
      )}

      {/* Sticky bar */}
      <div style={{position:'fixed',bottom:0,left:0,right:0,zIndex:30,borderTop:'1px solid hsl(var(--border))',background:'hsl(var(--card)/.95)',backdropFilter:'blur(8px)',padding:'10px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,boxShadow:'var(--shadow-lg)'}}>
        <div style={{display:'flex',alignItems:'center',gap:14,fontSize:'var(--text-sm)',...muted}}>
          {sel.size>0&&<>
            <span style={{fontWeight:500,color:'hsl(var(--foreground))'}}>已選 <span style={{color:'hsl(var(--primary))',fontWeight:700}}>{sel.size}</span> 個任務</span>
            <span style={{...mono,fontSize:'var(--text-xs)',display:'flex',alignItems:'center',gap:3}}>
              <svg width={11} height={11} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              約 {totalEst} 分鐘
            </span>
          </>}
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <button onClick={()=>setHist(v=>!v)} style={{...mono,fontSize:'var(--text-xs)',padding:'5px 12px',border:'1px solid hsl(var(--border))',borderRadius:'var(--radius-md)',background:'transparent',color:'hsl(var(--foreground))',cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>
            {hist?'收起歷史':'歷史趨勢'}
          </button>
          <button onClick={()=>{setPhase('idle');setSel(new Set());}} style={{...mono,fontSize:'var(--text-xs)',padding:'5px 14px',border:'1px solid hsl(var(--primary))',borderRadius:'var(--radius-md)',background:'transparent',color:'hsl(var(--primary))',cursor:'pointer'}}>
            重新載入
          </button>
          <button onClick={evaluate} disabled={!sel.size||!enabled.length||phase==='loading'||modalityConflict}
            style={{...mono,fontSize:'var(--text-sm)',fontWeight:600,padding:'7px 22px',border:'none',borderRadius:'var(--radius-md)',background:'hsl(var(--primary))',color:'hsl(var(--primary-foreground))',cursor:(!sel.size||!enabled.length||phase==='loading'||modalityConflict)?'not-allowed':'pointer',opacity:(!sel.size||!enabled.length||modalityConflict)?0.4:1,transition:'all .15s'}}>
            {phase==='loading'?'評估中…':modalityConflict?'模型 / 任務不相容':'開始評估'}
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
