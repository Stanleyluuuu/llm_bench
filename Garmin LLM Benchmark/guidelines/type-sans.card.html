<!-- @dsCard group="Type" viewport="700x220" name="Sans — Inter" subtitle="UI type scale: xs through 3xl, weights 400–700" -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body{margin:0;padding:16px 20px;background:hsl(var(--background));font-family:var(--font-sans)}
    .row{display:flex;align-items:baseline;gap:12px;border-bottom:1px solid hsl(var(--border));padding:4px 0}
    .row:last-child{border-bottom:none}
    .token{font-size:10px;font-family:var(--font-mono);color:hsl(var(--muted-foreground));width:100px;flex-shrink:0}
    .sample{color:hsl(var(--foreground))}
    .meta{font-size:10px;font-family:var(--font-mono);color:hsl(var(--muted-foreground));margin-left:auto}
  </style>
</head>
<body>
  <div class="row"><span class="token">--text-3xl</span><span class="sample" style="font-size:var(--text-3xl);font-weight:700;line-height:1">AI 模型評測平台</span><span class="meta">30px · 700</span></div>
  <div class="row"><span class="token">--text-2xl</span><span class="sample" style="font-size:var(--text-2xl);font-weight:600">Benchmark Results</span><span class="meta">24px · 600</span></div>
  <div class="row"><span class="token">--text-xl</span><span class="sample" style="font-size:var(--text-xl);font-weight:600">Benchmark 模型</span><span class="meta">20px · 600</span></div>
  <div class="row"><span class="token">--text-lg</span><span class="sample" style="font-size:var(--text-lg);font-weight:500">Project Selection Card</span><span class="meta">18px · 500</span></div>
  <div class="row"><span class="token">--text-base</span><span class="sample" style="font-size:var(--text-base)">選擇模型與測試專案，一鍵比較效能表現</span><span class="meta">16px · 400</span></div>
  <div class="row"><span class="token">--text-sm</span><span class="sample" style="font-size:var(--text-sm);color:hsl(var(--muted-foreground))">此任務不支援此模型 — 跳過評估</span><span class="meta">14px · 400</span></div>
  <div class="row"><span class="token">--text-xs</span><span class="sample" style="font-size:var(--text-xs);color:hsl(var(--muted-foreground));letter-spacing:.03em;text-transform:uppercase;font-weight:500">RUNS · MODELS · STATUS</span><span class="meta">12px · 500</span></div>
</body>
</html>
