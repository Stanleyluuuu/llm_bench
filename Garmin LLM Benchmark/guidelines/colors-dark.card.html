<!-- @dsCard group="Colors" viewport="700x130" name="Dark Mode Palette" subtitle="Navy backgrounds with soft indigo primary" -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body{margin:0;padding:16px;background:#111827;font-family:var(--font-sans)}
  </style>
</head>
<body>
  <div class="dark" style="display:flex;gap:8px">
    <div style="flex:1;height:98px;border-radius:6px;background:hsl(var(--background));border:1px solid hsl(var(--border));display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px">
      <span style="font-size:10px;font-family:var(--font-mono);color:hsl(var(--muted-foreground))">--background<br>#0A1120</span>
    </div>
    <div style="flex:1;height:98px;border-radius:6px;background:hsl(var(--card));border:1px solid hsl(var(--border));display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px">
      <span style="font-size:10px;font-family:var(--font-mono);color:hsl(var(--muted-foreground))">--card<br>#161B22</span>
    </div>
    <div style="flex:1;height:98px;border-radius:6px;background:hsl(var(--secondary));border:1px solid hsl(var(--border));display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px">
      <span style="font-size:10px;font-family:var(--font-mono);color:hsl(var(--muted-foreground))">--secondary</span>
    </div>
    <div style="flex:1;height:98px;border-radius:6px;background:hsl(var(--primary));border:1px solid hsl(var(--border));display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px">
      <span style="font-size:10px;font-family:var(--font-mono);color:hsl(var(--primary-foreground))">--primary<br>indigo-400</span>
    </div>
    <div style="flex:1;height:98px;border-radius:6px;background:hsl(var(--accent));border:1px solid hsl(var(--border));display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px">
      <span style="font-size:10px;font-family:var(--font-mono);color:hsl(var(--foreground))">--accent</span>
    </div>
  </div>
</body>
</html>
